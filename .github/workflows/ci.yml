name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run tests
        run: python -m pytest -q

  test-with-build123d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with build123d
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]" "build123d>=0.8"
      - name: Run build123d-dependent tests
        run: python -m pytest -q tests/test_mesh_pipeline_smoke.py -k validate_reconstruction
