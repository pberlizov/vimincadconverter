name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run tests
        run: python -m pytest -q

  test-rq:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: RQ integration tests
        env:
          MESH2CAD_TEST_REDIS_URL: redis://127.0.0.1:6379/15
        run: python -m pytest -q tests/test_rq_integration.py

  test-with-build123d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with build123d
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]" "build123d>=0.8"
      - name: Run build123d-dependent tests
        run: |
          python -m pytest -q tests/test_mesh_pipeline_smoke.py -k validate_reconstruction
          python -m pytest -q tests/test_benchmarks.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.queue.yml config -q
      - name: Build API image
        run: docker build -t mesh2cad:ci .
      - name: Build CAD image (best-effort; large build123d layer)
        continue-on-error: true
        run: docker build -f Dockerfile.full -t mesh2cad:cad-ci .
