name: Publish container images

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ghcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image base (lowercase)
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.base }}:latest
            ${{ steps.img.outputs.base }}:api-${{ github.sha }}
          build-args: |
            PIP_EXTRAS=api,queue

      - name: Build and push CAD image (build123d in-container)
        id: cad
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.full
          push: true
          tags: |
            ${{ steps.img.outputs.base }}:cad
            ${{ steps.img.outputs.base }}:cad-${{ github.sha }}
          build-args: |
            PIP_EXTRAS=api,queue,cad

      - name: CAD image build note
        if: steps.cad.outcome == 'failure'
        run: echo "::warning::CAD image (Dockerfile.full) failed to build or push; :latest was still published if the API step succeeded."
