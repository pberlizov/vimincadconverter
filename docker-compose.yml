services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_EXTRAS: ${MESH2CAD_PIP_EXTRAS:-api,queue}
    ports:
      - "${MESH2CAD_HOST_PORT:-8000}:8000"
    environment:
      MESH2CAD_STATE_DIR: /data/state
      MESH2CAD_BIND_HOST: "0.0.0.0"
      MESH2CAD_BIND_PORT: "8000"
      MESH2CAD_JOB_BACKEND: ${MESH2CAD_JOB_BACKEND:-thread}
      MESH2CAD_REDIS_URL: ${MESH2CAD_REDIS_URL:-}
    volumes:
      - mesh2cad_state:/data/state
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:$${MESH2CAD_BIND_PORT}/ready\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  mesh2cad_state:
