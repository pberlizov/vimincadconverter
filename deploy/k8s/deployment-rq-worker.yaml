# Optional: separate worker Pods (scale with `kubectl scale deployment mesh2cad-rq-worker --replicas=N`).
# Requires Redis and a volume the API and every worker can mount at the same time.
# ReadWriteOnce PVCs attach to ONE Pod only — use deployment-api.yaml (API+worker in one Pod)
# or switch to ReadWriteMany / NFS. Do not apply this together with deployment-api.yaml
# unless you use distinct PVCs and know what you are doing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh2cad-rq-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mesh2cad-rq-worker
  template:
    metadata:
      labels:
        app: mesh2cad-rq-worker
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/example/vimincadconverter:latest
          imagePullPolicy: IfNotPresent
          command: ["mesh2cad-rq-worker"]
          env:
            - name: MESH2CAD_STATE_DIR
              value: /data/state
            - name: MESH2CAD_REDIS_URL
              value: "redis://REPLACE:6379/0"
            - name: MESH2CAD_RQ_QUEUE
              value: mesh2cad
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: state
              mountPath: /data/state
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: mesh2cad-state
