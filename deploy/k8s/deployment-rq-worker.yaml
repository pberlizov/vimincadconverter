# Optional: scale with `kubectl scale deployment mesh2cad-rq-worker --replicas=N`
# Requires Redis and the same state volume as the API (ReadWriteMany or single worker + one API).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh2cad-rq-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mesh2cad-rq-worker
  template:
    metadata:
      labels:
        app: mesh2cad-rq-worker
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/example/vimincadconverter:latest
          imagePullPolicy: IfNotPresent
          command: ["mesh2cad-rq-worker"]
          env:
            - name: MESH2CAD_STATE_DIR
              value: /data/state
            - name: MESH2CAD_REDIS_URL
              value: "redis://REPLACE:6379/0"
            - name: MESH2CAD_RQ_QUEUE
              value: mesh2cad
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: state
              mountPath: /data/state
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: mesh2cad-state
