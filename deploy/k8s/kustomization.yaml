# Default production-oriented stack: PVC + Redis + API/worker Pod + Service.
#   kubectl apply -k deploy/k8s
#
# Thread-only (no Redis / in-process jobs):
#   kubectl apply -f deploy/k8s/pvc.yaml -f deploy/k8s/deployment-thread.yaml -f deploy/k8s/service-api.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - redis.yaml
  - deployment-api.yaml
  - service-api.yaml
