{% extends "base.html" %}
{% block content %}
<section class="auth-panel">
  <div class="panel-head">
    <h1>Sign In</h1>
    <p>Authenticated access is required to upload geometry, inspect jobs, and download generated CAD assets.</p>
  </div>
  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}
  <form class="stack-form" method="post" action="/login">
    <label>
      <span>Username</span>
      <input type="text" name="username" autocomplete="username" required>
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button class="primary-button" type="submit">Open Console</button>
  </form>
</section>
{% endblock %}
